 const categories=Object.keys(CATEGORY_STRUCTURE); const subcategoriesForDraft=Object.keys(CATEGORY_STRUCTURE[draft.category].subcategories); const typesForDraft=CATEGORY_STRUCTURE[draft.category].subcategories[draft.subcategory]||[]; const subcategoryOptions=filters.category?Object.keys(CATEGORY_STRUCTURE[filters.category].subcategories):[]; const typeOptions=filters.category&&filters.subcategory?CATEGORY_STRUCTURE[filters.category].subcategories[filters.subcategory]||[]:[];
 const filteredItems=useMemo(()=>{ let next=data.items.slice(); if(search.trim()){ const token=search.toLowerCase(); next=next.filter(item=>[item.name,item.store,item.category,item.subcategory,item.type,item.addedBy,item.notes].filter(Boolean).some(v=>String(v).toLowerCase().includes(token))); } if(filters.category) next=next.filter(item=>item.category===filters.category); if(filters.subcategory) next=next.filter(item=>item.subcategory===filters.subcategory); if(filters.type) next=next.filter(item=>item.type===filters.type); if(filters.status) next=next.filter(item=>item.status===filters.status); if(filters.addedBy) next=next.filter(item=>item.addedBy===filters.addedBy); if(filters.favoritesOnly) next=next.filter(item=>item.favorite); next.sort((a,b)=>{ if(filters.sort==="priceAsc") return Number(a.price||0)-Number(b.price||0); if(filters.sort==="priceDesc") return Number(b.price||0)-Number(a.price||0); if(filters.sort==="name") return String(a.name||"").localeCompare(String(b.name||""),"pt-BR"); if(filters.sort==="purchased") return (a.status==="Purchased"?1:0)-(b.status==="Purchased"?1:0); return new Date(b.createdAt||0)-new Date(a.createdAt||0); }); return next; },[data.items,search,filters]);
 const favoriteItems=filteredItems.filter(item=>item.favorite); const purchasedItems=data.items.filter(item=>item.status==="Purchased"); const totalSpent=purchasedItems.reduce((s,i)=>s+Number(i.price||0),0); const totalWishlist=data.items.reduce((s,i)=>s+Number(i.price||0),0); const remainingValue=data.items.filter(i=>i.status!=="Purchased").reduce((s,i)=>s+Number(i.price||0),0); const totalNeed=data.items.filter(i=>i.status==="Need").length; const totalWant=data.items.filter(i=>i.status==="Want").length; const categorySpent=categories.map(category=>({category,value:data.items.filter(i=>i.category===category&&i.status==="Purchased").reduce((s,i)=>s+Number(i.price||0),0)})); const personSummary=PEOPLE.map(person=>({person,total:data.items.filter(i=>i.addedBy===person).length,purchased:data.items.filter(i=>i.addedBy===person&&i.status==="Purchased").reduce((s,i)=>s+Number(i.price||0),0)}));
 function resetFilters(){ setFilters({category:"",subcategory:"",type:"",status:"",addedBy:"",favoritesOnly:false,sort:"recent"}); setSearch(""); }
 function openNewModal(prefill){ const nextDraft={...emptyItem(),...prefill}; const validSub=Object.keys(CATEGORY_STRUCTURE[nextDraft.category].subcategories); if(!validSub.includes(nextDraft.subcategory)) nextDraft.subcategory=validSub[0]; const validType=CATEGORY_STRUCTURE[nextDraft.category].subcategories[nextDraft.subcategory]; if(!validType.includes(nextDraft.type)) nextDraft.type=validType[0]; setDraft(nextDraft); setModalOpen(true); }
 function openEditModal(item){ setDraft({...item,price:String(item.price??"")}); setModalOpen(true); }
 function updateDraft(field,value){ setDraft(prev=>{ const next={...prev,[field]:value}; if(field==="category"){ const subcats=Object.keys(CATEGORY_STRUCTURE[value].subcategories); next.subcategory=subcats[0]; next.type=CATEGORY_STRUCTURE[value].subcategories[next.subcategory][0]; } if(field==="subcategory"){ next.type=CATEGORY_STRUCTURE[next.category].subcategories[value][0]; } return next; }); }
 async function handleItemImageUpload(e){ const file=e.target.files&&e.target.files[0]; if(!file) return; const dataUrl=await fileToDataURL(file); updateDraft("image",dataUrl); }
 async function handleCategoryImageUpload(e){ const file=e.target.files&&e.target.files[0]; if(!file||!categoryModal) return; const dataUrl=await fileToDataURL(file); setData(prev=>({...prev,categoryImages:{...prev.categoryImages,[categoryModal]:dataUrl}})); showToast("Imagem da categoria atualizada."); }
 function saveItem(){ if(!draft.name.trim()) return showToast("Informe o nome do produto."); if(!draft.store.trim()) return showToast("Informe a loja."); const price=Number(String(draft.price).replace(/\./g,"").replace(",",".")); if(Number.isNaN(price)||price<=0) return showToast("Informe um valor válido."); setData(prev=>{ const payload={...draft,price,createdAt:draft.id?draft.createdAt:new Date().toISOString(),purchasedAt:draft.status==="Purchased"?(draft.purchasedAt||new Date().toISOString()):null}; if(draft.id){ return {...prev,items:prev.items.map(item=>item.id===draft.id?payload:item)}; } return {...prev,nextId:prev.nextId+1,items:[{...payload,id:prev.nextId},...prev.items]}; }); setModalOpen(false); showToast(draft.id?"Produto atualizado.":"Produto adicionado."); }
 function deleteItem(id){ if(!window.confirm("Remover este item da wishlist?")) return; setData(prev=>({...prev,items:prev.items.filter(item=>item.id!==id)})); showToast("Item removido."); }
 function toggleFavorite(id){ setData(prev=>({...prev,items:prev.items.map(item=>item.id===id?{...item,favorite:!item.favorite}:item)})); }
 function quickStatusFilter(status){ setFilters(prev=>({...prev,status:prev.status===status?"":status})); setTab("galeria"); }
 function runImport(){ const parsed=inferProductFromUrl(importUrl.trim()); if(!parsed) return showToast("Cole um link válido para pré-preencher a ficha."); setImportDraft({...emptyItem(),...parsed,addedBy:filters.addedBy||"Ricardo"}); }
 function applyImport(){ if(!importDraft) return; openNewModal(importDraft); setTab("galeria"); showToast("Pré-preenchimento aplicado. Complete preço e imagem se necessário."); }
 if(!loaded) return <div className="app-shell"><div className="container"><div className="empty">Carregando sua wishlist compartilhada...</div></div></div>;
 return <div className="app-shell"><div className="container"><div className="hero"><div className="hero-top"><div className="title-block"><h1>Wishlist da Casa</h1><p>Um planner elegante para Ricardo e Marcela organizarem o que falta comprar, o que já entrou na casa e quanto já foi investido em cada sonho.</p></div><div className="hero-actions"><button className="btn soft" onClick={()=>setTab("importar")}>Importar link</button><button className="btn" onClick={()=>openNewModal()}>+ Novo produto</button><button className="btn primary" onClick={()=>setFilters(prev=>({...prev,addedBy:prev.addedBy==="Marcela"?"":"Marcela"}))}>Ver só Marcela</button></div></div><div className="search-wrap"><input className="input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Busque por produto, loja, categoria ou quem adicionou..."/><button className="btn" onClick={resetFilters}>Limpar filtros</button></div><div className="toolbar">{TABS.map(item=><button key={item.id} className={"tab "+(tab===item.id?"active":"")} onClick={()=>setTab(item.id)}>{item.label}</button>)}{syncing&&<span className="tab active" style={{cursor:'default'}}>☁️ salvando</span>}</div><div className="stats-grid"><div className="stat-card"><span>Total de itens</span><strong>{data.items.length}</strong><small>Wishlist compartilhada</small></div><div className="stat-card"><span>Need</span><strong>{totalNeed}</strong><small>Itens prioritários</small></div><div className="stat-card"><span>Want</span><strong>{totalWant}</strong><small>Desejos em aberto</small></div><div className="stat-card"><span>Total gasto</span><strong>{fmtCurrency(totalSpent)}</strong><small>Só itens Purchased</small></div><div className="stat-card"><span>Falta comprar</span><strong>{fmtCurrency(remainingValue)}</strong><small>Restante da wishlist</small></div></div><div className="top-note">Wishlist compartilhada pela nuvem via Supabase. Esta versão usa a linha id 2 da mesma tabela do app financeiro para não misturar os dados.</div></div>
 {(tab==="galeria"||tab==="favoritos"||tab==="board")&&<div className="filters-card"><div className="filters-grid"><select className="select" value={filters.category} onChange={e=>setFilters(prev=>({...prev,category:e.target.value,subcategory:"",type:""}))}><option value="">Todas as categorias</option>{categories.map(category=><option key={category} value={category}>{category}</option>)}</select><select className="select" value={filters.subcategory} onChange={e=>setFilters(prev=>({...prev,subcategory:e.target.value,type:""}))}><option value="">Todas as subcategorias</option>{subcategoryOptions.map(sub=><option key={sub} value={sub}>{sub}</option>)}</select><select className="select" value={filters.type} onChange={e=>setFilters(prev=>({...prev,type:e.target.value}))}><option value="">Todos os tipos</option>{typeOptions.map(type=><option key={type} value={type}>{type}</option>)}</select><select className="select" value={filters.status} onChange={e=>setFilters(prev=>({...prev,status:e.target.value}))}><option value="">Todos os status</option>{STATUS_OPTIONS.map(status=><option key={status} value={status}>{status}</option>)}</select><select className="select" value={filters.addedBy} onChange={e=>setFilters(prev=>({...prev,addedBy:e.target.value}))}><option value="">Todos adicionados por</option>{PEOPLE.map(person=><option key={person} value={person}>{person}</option>)}</select><select className="select" value={filters.sort} onChange={e=>setFilters(prev=>({...prev,sort:e.target.value}))}><option value="recent">Mais recentes</option><option value="priceAsc">Menor preço</option><option value="priceDesc">Maior preço</option><option value="name">Nome A-Z</option><option value="purchased">Purchased por último</option></select></div><div className="chip-row"><button className={"chip want "+(filters.status==="Want"?"active":"")} onClick={()=>quickStatusFilter("Want")}>Want</button><button className={"chip need "+(filters.status==="Need"?"active":"")} onClick={()=>quickStatusFilter("Need")}>Need</button><button className={"chip purchased "+(filters.status==="Purchased"?"active":"")} onClick={()=>quickStatusFilter("Purchased")}>Purchased</button><button className={"chip "+(filters.favoritesOnly?"active":"")} onClick={()=>setFilters(prev=>({...prev,favoritesOnly:!prev.favoritesOnly}))}>Só favoritos</button><button className={"chip "+(filters.addedBy==="Ricardo"?"active":"")} onClick={()=>setFilters(prev=>({...prev,addedBy:prev.addedBy==="Ricardo"?"":"Ricardo"}))}>Só Ricardo</button><button className={"chip "+(filters.addedBy==="Marcela"?"active":"")} onClick={()=>setFilters(prev=>({...prev,addedBy:prev.addedBy==="Marcela"?"":"Marcela"}))}>Só Marcela</button></div></div>}
 {tab==="galeria"&&<div className="main-layout"><div className="content-card">{filteredItems.length?<div className="gallery-grid">{filteredItems.map(item=><ProductCard key={item.id} item={item} onEdit={openEditModal} onDelete={deleteItem} onToggleFavorite={toggleFavorite}/> )}</div>:<div className="empty">Nenhum item encontrado com os filtros atuais.</div>}</div><div className="side-card"><h3 className="section-title">Resumo financeiro</h3><div className="summary-list"><div className="summary-row"><span>Comprados</span><strong>{purchasedItems.length}</strong></div><div className="summary-row"><span>Total gasto</span><strong>{fmtCurrency(totalSpent)}</strong></div><div className="summary-row"><span>Total da wishlist</span><strong>{fmtCurrency(totalWishlist)}</strong></div><div className="summary-row"><span>Falta comprar</span><strong>{fmtCurrency(remainingValue)}</strong></div></div><h3 className="section-title" style={{marginTop:20}}>Por categoria</h3><div className="summary-list">{categorySpent.map(row=><div key={row.category} className="summary-row"><span>{row.category}</span><strong>{fmtCurrency(row.value)}</strong></div>)}</div><h3 className="section-title" style={{marginTop:20}}>Por pessoa</h3><div className="person-stat">{personSummary.map(row=><div key={row.person} className="person-pill"><span>{row.person}: {row.total} itens</span><strong>{fmtCurrency(row.purchased)}</strong></div>)}</div></div></div>}
 {tab==="categorias"&&<div className="category-grid">{categories.map(category=>{ const image=data.categoryImages[category]||categoryImageSeed[category]; const subcategories=CATEGORY_STRUCTURE[category].subcategories; const count=data.items.filter(item=>item.category===category).length; return <div className="content-card category-card" key={category}><div className="category-hero"><img src={image} alt={category}/><div className="category-overlay"><div><h3>{category}</h3><div style={{color:'rgba(255,255,255,.88)',fontSize:'13px'}}>{count} item(ns) cadastrados</div></div></div><div className="card-actions" style={{zIndex:4}}><button className="icon-btn" title="Editar imagem da categoria" onClick={()=>setCategoryModal(category)}>🖼️</button></div></div><div className="category-meta"><div className="area-list">{Object.entries(subcategories).map(([sub,types])=><div className="area-card" key={sub}><strong>{sub}</strong><span>{types.join(' • ')}</span></div>)}</div></div></div>; })}</div>}
 {tab==="board"&&<div className="board-grid">{STATUS_OPTIONS.map(status=>{ const items=filteredItems.filter(item=>item.status===status); return <div className="board-column" key={status}><div className="board-header"><h3>{status}</h3><span className={"tag "+status.toLowerCase()}>{items.length}</span></div><div className="board-list">{items.length?items.map(item=><MiniBoardCard key={item.id} item={item} onEdit={openEditModal}/>):<div className="empty" style={{padding:24}}>Sem itens em {status}.</div>}</div></div>; })}</div>}
 {tab==="favoritos"&&<div className="main-layout"><div className="content-card">{favoriteItems.length?<div className="gallery-grid">{favoriteItems.map(item=><ProductCard key={item.id} item={item} onEdit={openEditModal} onDelete={deleteItem} onToggleFavorite={toggleFavorite} compact/> )}</div>:<div className="empty">Ainda não há favoritos com os filtros atuais.</div>}</div><div className="side-card"><h3 className="section-title">Favoritos do casal</h3><div className="summary-list"><div className="summary-row"><span>Total de favoritos</span><strong>{favoriteItems.length}</strong></div><div className="summary-row"><span>Valor favoritos</span><strong>{fmtCurrency(favoriteItems.reduce((s,i)=>s+Number(i.price||0),0))}</strong></div><div className="summary-row"><span>Need dentro dos favoritos</span><strong>{favoriteItems.filter(item=>item.status==='Need').length}</strong></div></div></div></div>}
 {tab==="importar"&&<div className="main-layout"><div className="content-card import-box"><h3 className="section-title">Importar por link</h3><input className="input" value={importUrl} onChange={e=>setImportUrl(e.target.value)} placeholder="Cole um link de produto"/><div className="help-text">Nesta V1, o navegador consegue pré-preencher principalmente loja, nome inferido do link e a própria URL. Para puxar preço e imagem automaticamente de qualquer e-commerce, o próximo passo ideal é ligar uma Edge Function no Supabase.</div><div className="footer-actions" style={{justifyContent:'flex-start'}}><button className="btn primary" onClick={runImport}>Pré-preencher</button>{importDraft&&<button className="btn" onClick={applyImport}>Usar no formulário</button>}</div>{importDraft&&<div className="import-output"><div className="import-preview">{importDraft.image?<img src={importDraft.image} alt={importDraft.name}/>:<div className="image-fallback" style={{width:120,height:90,borderRadius:16,fontSize:28}}>♡</div>}<div><div style={{fontWeight:700,fontSize:18}}>{importDraft.name}</div><div className="help-text" style={{marginTop:6}}>Loja inferida: {importDraft.store||'—'}</div><div className="help-text">Quem vai adicionar: {importDraft.addedBy}</div></div></div></div>}</div><div className="side-card"><h3 className="section-title">Resumo financeiro</h3><div className="summary-list"><div className="summary-row"><span>Comprados</span><strong>{purchasedItems.length}</strong></div><div className="summary-row"><span>Total gasto</span><strong>{fmtCurrency(totalSpent)}</strong></div><div className="summary-row"><span>Total da wishlist</span><strong>{fmtCurrency(totalWishlist)}</strong></div><div className="summary-row"><span>Falta comprar</span><strong>{fmtCurrency(remainingValue)}</strong></div></div><h3 className="section-title" style={{marginTop:20}}>Por categoria</h3><div className="summary-list">{categorySpent.map(row=><div key={row.category} className="summary-row"><span>{row.category}</span><strong>{fmtCurrency(row.value)}</strong></div>)}</div></div></div>}
 </div>
 {modalOpen&&<div className="modal-backdrop" onClick={()=>setModalOpen(false)}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-header"><h2>{draft.id?'Editar produto':'Novo produto'}</h2><button className="icon-btn" onClick={()=>setModalOpen(false)}>×</button></div><div className="form-grid"><div><label>Nome do produto</label><input className="input" value={draft.name} onChange={e=>updateDraft('name',e.target.value)} placeholder="Ex: Poltrona de leitura"/></div><div><label>Loja</label><input className="input" value={draft.store} onChange={e=>updateDraft('store',e.target.value)} placeholder="Ex: Zara Home, Tok&Stok"/></div><div><label>Valor</label><input className="input" value={draft.price} onChange={e=>updateDraft('price',e.target.value)} placeholder="Ex: 259,90"/></div><div><label>Adicionado por</label><select className="select" value={draft.addedBy} onChange={e=>updateDraft('addedBy',e.target.value)}>{PEOPLE.map(person=><option key={person} value={person}>{person}</option>)}</select></div><div><label>Categoria</label><select className="select" value={draft.category} onChange={e=>updateDraft('category',e.target.value)}>{categories.map(category=><option key={category} value={category}>{category}</option>)}</select></div><div><label>Subcategoria / Área</label><select className="select" value={draft.subcategory} onChange={e=>updateDraft('subcategory',e.target.value)}>{subcategoriesForDraft.map(sub=><option key={sub} value={sub}>{sub}</option>)}</select></div><div><label>Tipo</label><select className="select" value={draft.type} onChange={e=>updateDraft('type',e.target.value)}>{typesForDraft.map(type=><option key={type} value={type}>{type}</option>)}</select></div><div><label>Status</label><select className="select" value={draft.status} onChange={e=>updateDraft('status',e.target.value)}>{STATUS_OPTIONS.map(status=><option key={status} value={status}>{status}</option>)}</select></div><div className="form-full"><label>Link do produto</label><input className="input" value={draft.link} onChange={e=>updateDraft('link',e.target.value)} placeholder="https://..."/></div><div><label>Imagem (URL)</label><input className="input" value={draft.image} onChange={e=>updateDraft('image',e.target.value)} placeholder="https://imagem.jpg"/></div><div><label>Ou envie uma imagem</label><input className="input" type="file" accept="image/*" onChange={handleItemImageUpload}/></div><div className="form-full"><label>Observações</label><textarea className="textarea" value={draft.notes} onChange={e=>updateDraft('notes',e.target.value)} placeholder="Ex: Comprar depois da cortina / comparar preços." /></div><div className="form-full switch-row"><label style={{display:'flex',alignItems:'center',gap:8,fontSize:14}}><input type="checkbox" checked={draft.favorite} onChange={e=>updateDraft('favorite',e.target.checked)}/> Marcar como favorito</label></div></div><div className="footer-actions"><button className="btn" onClick={()=>setModalOpen(false)}>Cancelar</button><button className="btn primary" onClick={saveItem}>Salvar produto</button></div></div></div>}
 {categoryModal&&<div className="modal-backdrop" onClick={()=>setCategoryModal(null)}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:620}}><div className="modal-header"><h2>Imagem da categoria {categoryModal}</h2><button className="icon-btn" onClick={()=>setCategoryModal(null)}>×</button></div><div className="form-grid"><div className="form-full"><label>URL da imagem</label><input className="input" value={data.categoryImages[categoryModal]||''} onChange={e=>setData(prev=>({...prev,categoryImages:{...prev.categoryImages,[categoryModal]:e.target.value}}))} placeholder="https://..."/></div><div className="form-full"><label>Ou envie uma imagem</label><input className="input" type="file" accept="image/*" onChange={handleCategoryImageUpload}/><div className="help-text">As categorias já começam com imagens padrão bonitas, mas vocês podem personalizar qualquer uma.</div></div></div><div className="footer-actions"><button className="btn" onClick={()=>setCategoryModal(null)}>Fechar</button></div></div></div>}
 {toast&&<div className="toast">{toast}</div>}</div>; }
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
