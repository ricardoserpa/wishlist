<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wishlist</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:Inter,Arial;background:#f7f3ef;color:#56433c}
.container{max-width:1100px;margin:0 auto;padding:20px}
h1{text-align:center;font-size:42px;margin:10px 0}
.subtitle{text-align:center;color:#8f7b72;margin-bottom:20px}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
 gap:14px;
}

.card{
 background:#fff;
 border-radius:16px;
 overflow:hidden;
 box-shadow:0 8px 20px rgba(0,0,0,0.06);
}
.card img{width:100%;height:130px;object-fit:cover}
.card-body{padding:10px}
.card-name{font-weight:600}
.card-price{font-size:14px;margin-top:4px;color:#6c544c}

.summary{
 margin-top:40px;
}
.summary-grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
 gap:14px;
}
.summary-card{
 background:#fff;
 padding:18px;
 border-radius:16px;
}
.summary-title{font-size:12px;color:#8f7b72}
.summary-value{font-size:22px;font-weight:bold;margin-top:4px}
</style>
</head>
<body>
<div class="container">
<h1>Wishlist</h1>
<div class="subtitle">Minha listinha de compras</div>

<div id="grid" class="grid"></div>

<div class="summary">
<div class="summary-grid">
  <div class="summary-card"><div class="summary-title">Total de itens</div><div id="total" class="summary-value">0</div></div>
  <div class="summary-card"><div class="summary-title">Need</div><div id="need" class="summary-value">0</div></div>
  <div class="summary-card"><div class="summary-title">Total gasto</div><div id="spent" class="summary-value">R$ 0</div></div>
  <div class="summary-card"><div class="summary-title">Favoritos</div><div id="fav" class="summary-value">0</div></div>
</div>
</div>

</div>

<script>
const SUPABASE_URL="https://nxhwtamhpyqwxozlvwco.supabase.co";
const SUPABASE_KEY="sb_publishable_Eg3BHEjDFYkKDQ4K4ZqODg_uYvuRRBM";
const TABLE="financas";
const ROW_ID=2;

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function load(){
 const res=await sb.from(TABLE).select('dados').eq('id',ROW_ID).single();
 const data=res.data?JSON.parse(res.data.dados):{items:[]};
 render(data.items||[]);
}

function render(items){
 const grid=document.getElementById('grid');
 grid.innerHTML='';
 let total=items.length;
 let need=0,spent=0,fav=0;

 items.forEach(i=>{
  if(i.status==='Need')need++;
  if(i.status==='Purchased')spent+=Number(i.price||0);
  if(i.favorite)fav++;

  const el=document.createElement('div');
  el.className='card';
  el.innerHTML=`
   <img src="${i.image||''}"/>
   <div class="card-body">
    <div class="card-name">${i.name}</div>
    <div class="card-price">R$ ${i.price}</div>
   </div>`;
  grid.appendChild(el);
 });

 document.getElementById('total').innerText=total;
 document.getElementById('need').innerText=need;
 document.getElementById('spent').innerText='R$ '+spent;
 document.getElementById('fav').innerText=fav;
}

load();
</script>
</body>
</html>
